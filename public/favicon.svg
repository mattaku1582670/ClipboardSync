<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Clipboard body -->
  <rect x="8" y="9" width="16" height="18" rx="2" ry="2" fill="#3B82F6"/>
  <rect x="9" y="10" width="14" height="16" rx="1.5" ry="1.5" fill="#1E40AF"/>

  <!-- Clipboard clip (top tab) -->
  <rect x="12" y="7" width="8" height="4" rx="2" ry="2" fill="#60A5FA"/>
  <rect x="13.5" y="7.5" width="5" height="2.5" rx="1" ry="1" fill="#1E293B"/>

  <!-- Sync arrows -->
  <!-- Left arrow (curved, going up-left) -->
  <path d="M11.5 15.5 Q10 13 12 11.5" stroke="#93C5FD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="11,11 12.5,10.5 12.8,12.2" fill="#93C5FD"/>

  <!-- Right arrow (curved, going down-right) -->
  <path d="M20.5 16.5 Q22 19 20 20.5" stroke="#93C5FD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="21,21 19.5,21.5 19.2,19.8" fill="#93C5FD"/>

  <!-- Lines representing text content -->
  <rect x="11" y="17" width="10" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.7"/>
  <rect x="11" y="20" width="7" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.5"/>
</svg>
